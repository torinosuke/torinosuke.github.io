<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デバッグ用 棚卸アプリ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .file-upload-label { display: block; padding: 15px; background: #2196F3; color: white; text-align: center; border-radius: 5px; }
    </style>
</head>
<body>
    <h3>💊 簡易棚卸アプリ (デバッグ版)</h3>
    <label for="filePicker" class="file-upload-label">📁 CSVを選択 (デバッグモード)</label>
    <input type="file" id="filePicker" accept=".csv" style="display: none;">
    <div id="tvMasterStatus" style="margin-top: 10px; font-weight: bold;">❌ 未読込</div>
    <div id="debugLog" style="margin-top: 10px; font-size: 12px; color: #666;"></div>

    <script>
        const masterData = new Map();

        document.getElementById('filePicker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            // 文字コードエラー対策で一度テキストとして読み込む
            reader.readAsText(file, 'Shift-JIS'); 
            
            reader.onload = function(evt) {
                const debugDiv = document.getElementById('debugLog');
                try {
                    masterData.clear();
                    const lines = evt.target.result.split(/\r\n|\n/);
                    let validCount = 0;

                    lines.forEach((line, index) => {
                        if (!line.trim()) return;
                        const tokens = line.split(',').map(t => t.trim().replace(/^"|"$/g, ''));
                        
                        // 【変更点】列数チェックを撤廃し、とりあえず1行目をログに出す
                        if (index === 0) {
                            console.log("読み込んだ1行目の列数:", tokens.length);
                            debugDiv.innerHTML = `デバッグ: 1行目の列数は ${tokens.length} でした。<br>中身: ${tokens.slice(0, 5).join(',')} ...`;
                        }

                        // 【変更点】今回は列数に関係なく、データがあるならMapに入れる
                        // ※本来は正しい列番号を指定する必要がありますが、まずは「読み込めるか」を確認
                        if (tokens.length >= 2) {
                            // 仮のロジック：0列目をコード、1列目を名前として登録
                            const code = tokens[0];
                            const name = tokens[1];
                            masterData.set(code, { drugName: name, pkgQty: 1, pkgUnit: "個" });
                            validCount++;
                        }
                    });

                    const status = document.getElementById('tvMasterStatus');
                    status.textContent = `✅ 読込成功: ${validCount}件 (列数チェックOFF)`;
                    status.style.color = 'green';
                    alert(`読み込み完了！ ${validCount}件のデータを認識しました。`);

                } catch (err) {
                    alert('エラーが発生しました: ' + err.message);
                    console.error(err);
                }
            };
        });
    </script>
</body>
</html>
