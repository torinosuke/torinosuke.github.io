<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易棚卸システム（Scandit Web SDK連携版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/scandit-web-datacapture-core@7.x/build/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scandit-web-datacapture-barcode@7.x/build/browser/index.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f0f4f8; color: #333; }
        h1 { text-align: center; color: #00796b; font-size: 1.5rem; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        button {
            width: 100%; padding: 15px; font-size: 1.1rem; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold;
        }
        .btn-blue { background-color: #2196F3; }
        .btn-green { background-color: #4CAF50; }
        .btn-red { background-color: #F44336; }
        .btn-gray { background-color: #757575; }
        .btn-orange { background-color: #FF9800; }
        
        input[type="number"], input[type="file"] {
            width: 100%; padding: 12px; margin: 5px 0 15px; box-sizing: border-box; font-size: 1.1rem; border: 1px solid #ccc; border-radius: 5px;
        }
        
        /* スキャナーUIのスタイル */
        #scandit-barcode-picker { width: 100%; height: 350px; display: none; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        
        #scanResult { background: #e0f2f1; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .drug-name { font-size: 1.2rem; font-weight: bold; color: #004d40; display: block; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.9rem; }
        th { background-color: #00796b; color: white; }
        
        .hidden { display: none; }
        .flex-container { display: flex; gap: 10px; justify-content: space-between; margin-top: 10px; }
        .flex-container button { margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>💊 簡易棚卸アプリ (Scandit版)</h1>

    <div id="step1">
        <h3>① 薬品マスタ(CSV)を読み込む</h3>
        <p><small>形式: JAN/GS1コード, 薬品名 (ヘッダーなし・Shift-JIS推奨)</small></p>
        <input type="file" id="csvFile" accept=".csv">
        <p id="masterStatus" style="color: red; font-weight: bold;">マスタ未読込</p>
    </div>

    <hr>

    <div id="step2" class="hidden">
        <h3>② 在庫スキャン</h3>
        <button id="startScanBtn" class="btn-blue" onclick="startScanner()">📷 スキャンを開始する</button>
        
        <div id="scandit-barcode-picker"></div>

        <div id="scanResult">
            <span id="displayCode" style="font-size:0.8rem; color:#666;"></span>
            <span id="displayName" class="drug-name">ここに薬品名が表示されます</span>
            
            <label for="inputQty">数量 (Enterで確定):</label>
            <input type="number" id="inputQty" placeholder="数量を入力" inputmode="numeric">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="cancelInput()" class="btn-red" style="flex:1;">キャンセル</button>
                <button onclick="addToList()" class="btn-green" style="flex:2;">リストに追加</button>
            </div>
        </div>
    </div>

    <hr>

    <div id="step3">
        <h3>③ スキャン済みリスト (<span id="count">0</span>件)</h3>
        <div class="flex-container">
            <button onclick="downloadCSV()" class="btn-gray" style="flex: 2;">📥 CSV出力</button>
            <button onclick="clearAllData()" class="btn-red" style="flex: 1; padding: 5px; font-size: 0.9rem;">データ全消去</button>
        </div>
        <table id="listTable">
            <thead>
                <tr>
                    <th>コード</th>
                    <th>薬品名</th>
                    <th>数量</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let masterData = {}; 
    let scannedList = []; 

    // Scandit SDK用の変数
    let scanditContext;
    let barcodeCapture;
    let camera;
    let isScannerInitialized = false;

    // --- マスタとリストの初期化 ---
    window.addEventListener('DOMContentLoaded', () => {
        const savedMaster = localStorage.getItem('masterData');
        if (savedMaster) {
            masterData = JSON.parse(savedMaster);
            document.getElementById('masterStatus').innerText = `✅ マスタ復元完了: ${Object.keys(masterData).length}件`;
            document.getElementById('masterStatus').style.color = "green";
            document.getElementById('step2').classList.remove('hidden');
        }

        const savedList = localStorage.getItem('scannedList');
        if (savedList) {
            scannedList = JSON.parse(savedList);
            updateTable();
        }
    });

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            encoding: "Shift-JIS",
            complete: function(results) {
                masterData = {}; 
                results.data.forEach(row => {
                    if(row.length >= 2 && row[0]) {
                        const rawCode = row[0].trim();
                        // 01から始まるGS1の処理
                        const cleanCode = rawCode.replace(/^01/, ''); 
                        masterData[rawCode] = row[1].trim();
                        if (cleanCode !== rawCode) {
                            masterData[cleanCode] = row[1].trim();
                        }
                    }
                });
                
                localStorage.setItem('masterData', JSON.stringify(masterData));
                document.getElementById('masterStatus').innerText = `✅ 読込完了: ${Object.keys(masterData).length}件`;
                document.getElementById('masterStatus').style.color = "green";
                document.getElementById('step2').classList.remove('hidden');
            }
        });
    });

    // --- Scandit 初期化・スキャン制御ロジック ---
    async function initScandit() {
        if (isScannerInitialized) return;

        try {
            // ライセンスキーとエンジンの場所を指定
            await ScanditDataCaptureCore.configure({
                licenseKey: "YOUR_SCANDIT_LICENSE_KEY_HERE", // ←ここに試用版ライセンスキーを貼り付けてください
                libraryLocation: "https://cdn.jsdelivr.net/npm/scandit-web-datacapture-core@7.x/build/engine/",
                moduleLoaders: [ScanditBarcodeCapture.barcodeCaptureLoader()]
            });

            scanditContext = ScanditDataCaptureCore.DataCaptureContext.create();

            // 医療現場で必須となるシンボル（バーコード規格）の有効化
            const settings = new ScanditBarcodeCapture.BarcodeCaptureSettings();
            settings.enableSymbologies([
                ScanditDataCaptureCore.Symbology.EAN13UPCA, // 一般的なJAN
                ScanditDataCaptureCore.Symbology.GS1Databar, // 医療用GS1データバー
                ScanditDataCaptureCore.Symbology.GS1DatabarExpanded,
                ScanditDataCaptureCore.Symbology.GS1DatabarLimited,
                ScanditDataCaptureCore.Symbology.Code128, // 医療材料などに多いGS1-128
                ScanditDataCaptureCore.Symbology.DataMatrix // 調剤包装単位の二次元コード
            ]);

            barcodeCapture = ScanditBarcodeCapture.BarcodeCapture.forContext(scanditContext, settings);

            // スキャン成功時のイベントリスナー
            barcodeCapture.addListener({
                didScan: (barcodeCapture, session) => {
                    const barcode = session.newlyRecognizedBarcodes[0];
                    // 連続スキャンを防ぐため、数量入力が終わるまでスキャン機能を一時停止
                    barcodeCapture.isEnabled = false;
                    
                    // UI更新のためメインスレッドへ処理を渡す
                    requestAnimationFrame(() => {
                        onScanSuccess(barcode.data);
                    });
                }
            });

            camera = ScanditDataCaptureCore.Camera.default;
            scanditContext.setFrameSource(camera);

            const viewElement = document.getElementById("scandit-barcode-picker");
            const dataCaptureView = ScanditDataCaptureCore.DataCaptureView.forContext(scanditContext);
            dataCaptureView.connectToElement(viewElement);
            
            // スキャン範囲の枠（ファインダー）を表示
            dataCaptureView.addOverlay(
                ScanditBarcodeCapture.BarcodeCaptureOverlay.withBarcodeCaptureForViewWithStyle(
                    barcodeCapture,
                    dataCaptureView,
                    ScanditBarcodeCapture.BarcodeCaptureOverlayStyle.Frame
                )
            );

            isScannerInitialized = true;
        } catch (error) {
            console.error("Scandit初期化エラー:", error);
            alert("カメラの初期化に失敗しました。カメラのアクセス許可を確認してください。");
        }
    }

    async function startScanner() {
        document.getElementById('scandit-barcode-picker').style.display = "block";
        document.getElementById('startScanBtn').style.display = "none";
        document.getElementById('scanResult').style.display = "none";

        if (!isScannerInitialized) {
            await initScandit();
        }
        
        // カメラとスキャンを再開
        await camera.switchToDesiredState(ScanditDataCaptureCore.FrameSourceState.On);
        barcodeCapture.isEnabled = true;
    }

    function onScanSuccess(decodedText) {
        let searchCode = decodedText.trim();
        let name = masterData[searchCode];

        // 14桁以上のGS1で、先頭が01の場合のフォールバック
        if (!name && searchCode.startsWith("01") && searchCode.length >= 14) {
            searchCode = searchCode.substring(2);
            name = masterData[searchCode];
        }
        
        name = name || "マスタ未登録の薬品";
        
        // スキャン画面を非表示にし、数量入力画面を表示
        document.getElementById('scandit-barcode-picker').style.display = "none";
        document.getElementById('scanResult').style.display = "block";
        
        document.getElementById('displayCode').innerText = decodedText;
        document.getElementById('displayName').innerText = name;
        
        const qtyInput = document.getElementById('inputQty');
        qtyInput.value = "1"; // デフォルトを1にしておくと入力の手間が省ける場合があります
        qtyInput.focus();
        qtyInput.select();
    }

    // --- 数量入力・リスト操作ロジック ---
    document.getElementById('inputQty').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            addToList();
        }
    });

    function addToList() {
        const code = document.getElementById('displayCode').innerText;
        const name = document.getElementById('displayName').innerText;
        const qtyStr = document.getElementById('inputQty').value;

        if(!qtyStr) { alert("数量を入力してください"); return; }
        const qty = parseFloat(qtyStr);

        const existingItem = scannedList.find(item => item.code === code);
        if (existingItem) {
            existingItem.qty = Number(existingItem.qty) + qty;
        } else {
            scannedList.push({ code, name, qty });
        }
        
        localStorage.setItem('scannedList', JSON.stringify(scannedList));
        updateTable();
        
        // 数量確定後、自動的にスキャン画面へ復帰させる
        startScanner();
    }

    function cancelInput() {
        // キャンセルした場合は入力をクリアしてスキャン画面へ戻る
        startScanner();
    }

    function updateTable() {
        const tbody = document.querySelector('#listTable tbody');
        tbody.innerHTML = "";
        scannedList.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${escapeHtml(item.code)}</td><td>${escapeHtml(item.name)}</td><td>${item.qty}</td>`;
            tbody.appendChild(row);
        });
        document.getElementById('count').innerText = scannedList.length;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function clearAllData() {
        if (confirm("スキャン済みのリストとマスタデータをすべて消去します。よろしいですか？")) {
            localStorage.clear();
            masterData = {};
            scannedList = [];
            updateTable();
            document.getElementById('masterStatus').innerText = "マスタ未読込";
            document.getElementById('masterStatus').style.color = "red";
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('scandit-barcode-picker').style.display = "none";
            document.getElementById('scanResult').style.display = "none";
            document.getElementById('startScanBtn').style.display = "block";
            
            // カメラをオフにする
            if (camera) {
                camera.switchToDesiredState(ScanditDataCaptureCore.FrameSourceState.Off);
            }
        }
    }

    function downloadCSV() {
        if(scannedList.length === 0) { alert("データがありません"); return; }
        
        let csvContent = "コード,薬品名,数量\n";
        scannedList.forEach(item => {
            const safeName = item.name.replace(/"/g, '""');
            csvContent += `"${item.code}","${safeName}",${item.qty}\n`;
        });

        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: "text/csv;charset=utf-8;" });
        const url = window.URL.createObjectURL(blob);
        
        const a = document.createElement("a");
        a.href = url;
        
        const now = new Date();
        const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        a.download = `棚卸結果_${dateStr}.csv`;
        a.click();
    }
</script>

</body>
</html>
