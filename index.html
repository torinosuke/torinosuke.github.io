<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易棚卸システム</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f0f4f8; color: #333; }
        h1 { text-align: center; color: #00796b; font-size: 1.5rem; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* ボタンのデザイン */
        button {
            width: 100%; padding: 15px; font-size: 1.1rem; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold;
        }
        .btn-blue { background-color: #2196F3; }
        .btn-green { background-color: #4CAF50; }
        .btn-red { background-color: #F44336; }
        .btn-gray { background-color: #757575; }
        
        /* 入力エリア */
        input[type="number"], input[type="file"] {
            width: 100%; padding: 12px; margin: 5px 0 15px; box-sizing: border-box; font-size: 1.1rem; border: 1px solid #ccc; border-radius: 5px;
        }
        
        /* 読み取りエリア */
        #reader { width: 100%; margin-bottom: 20px; display: none; }
        
        /* 結果表示エリア */
        #scanResult { background: #e0f2f1; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .drug-name { font-size: 1.2rem; font-weight: bold; color: #004d40; display: block; margin-bottom: 10px; }
        
        /* リスト表示 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.9rem; }
        th { background-color: #00796b; color: white; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>💊 簡易棚卸アプリ</h1>

    <div id="step1">
        <h3>① 薬品マスタ(CSV)を読み込む</h3>
        <p><small>形式: JANコード, 薬品名 (ヘッダーなし)</small></p>
        <input type="file" id="csvFile" accept=".csv">
        <p id="masterStatus" style="color: red;">マスタ未読込</p>
    </div>

    <hr>

    <div id="step2" class="hidden">
        <h3>② 在庫スキャン</h3>
        <div id="reader"></div>
        <button id="startScanBtn" class="btn-blue">📷 カメラを起動してスキャン</button>
        <button id="stopScanBtn" class="btn-gray hidden">カメラを停止</button>

        <div id="scanResult">
            <span id="displayCode" style="font-size:0.8rem; color:#666;"></span>
            <span id="displayName" class="drug-name">ここに薬品名が表示されます</span>
            
            <label>数量:</label>
            <input type="number" id="inputQty" placeholder="数量を入力" inputmode="numeric">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="clearInput()" class="btn-red" style="flex:1;">キャンセル</button>
                <button onclick="addToList()" class="btn-green" style="flex:2;">リストに追加</button>
            </div>
        </div>
    </div>

    <hr>

    <div id="step3">
        <h3>③ スキャン済みリスト (<span id="count">0</span>件)</h3>
        <button onclick="downloadCSV()" class="btn-gray">📥 CSV出力</button>
        <table id="listTable">
            <thead>
                <tr>
                    <th>コード</th>
                    <th>薬品名</th>
                    <th>数量</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let masterData = {}; // JANコード: 薬品名 の辞書
    let scannedList = []; // スキャン結果のリスト
    let html5QrCode;

    // --- 1. CSV読み込み処理 ---
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            encoding: "Shift-JIS",
            complete: function(results) {
                // CSVの1列目をキー、2列目を値として登録
                results.data.forEach(row => {
                    if(row.length >= 2) {
                        // GS1は先頭の(01)などを除去するか、完全一致にするか調整が必要
                        // 今回は単純なJAN(13桁)やGS1コードそのものをキーにします
                        masterData[row[0].trim()] = row[1].trim();
                    }
                });
                document.getElementById('masterStatus').innerText = `✅ 読込完了: ${Object.keys(masterData).length}件`;
                document.getElementById('masterStatus').style.color = "green";
                document.getElementById('step2').classList.remove('hidden');
            }
        });
    });

    // --- 2. バーコードスキャン処理 ---
    document.getElementById('startScanBtn').addEventListener('click', () => {
        const backCamera = devices.find(device =>
            device.label.includes("facing back")
        );

        if (!backCamera) {
            alert("背面カメラが見つかりません");
            return;
        }
        
        document.getElementById('reader').style.display = "block";
        document.getElementById('startScanBtn').classList.add('hidden');
        document.getElementById('stopScanBtn').classList.remove('hidden');

        html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 5, 
            /* qrbox: { width: 250, height: 150 }, */
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.EAN_13, 
                Html5QrcodeSupportedFormats.RSS_14, // GS1 Databar
                Html5QrcodeSupportedFormats.RSS_EXPANDED 
            ]
        };
        
        html5QrCode.start({ facingMode: "environment" } , config, onScanSuccess
        ).then(() => {
            console.log("カメラ起動成功");
        })
        .catch(err => {
            alert(err);
            console.error(err);
        });
    });

    document.getElementById('stopScanBtn').addEventListener('click', stopCamera);

    function stopCamera() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = "none";
                document.getElementById('startScanBtn').classList.remove('hidden');
                document.getElementById('stopScanBtn').classList.add('hidden');
            }).catch(err => console.log(err));
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        // 音を鳴らす（任意）
        // let audio = new Audio('beep.mp3'); audio.play();

        // 連続スキャンを防ぐため一旦カメラを停止、または一時停止
        stopCamera();

        // マスタ照合
        const name = masterData[decodedText] || "マスタ未登録の薬品";
        
        // 結果表示
        document.getElementById('scanResult').style.display = "block";
        document.getElementById('displayCode').innerText = decodedText;
        document.getElementById('displayName').innerText = name;
        
        // 数量入力へフォーカス
        document.getElementById('inputQty').value = "";
        document.getElementById('inputQty').focus();
    }

    // --- 3. リスト追加処理 ---
    function addToList() {
        const code = document.getElementById('displayCode').innerText;
        const name = document.getElementById('displayName').innerText;
        const qty = document.getElementById('inputQty').value;

        if(!qty) { alert("数量を入力してください"); return; }

        // リストに追加
        scannedList.push({ code, name, qty });
        updateTable();
        
        // スキャン画面をリセットしてカメラ再起動準備
        clearInput();
        // 連続作業のために自動でカメラ起動する場合はここに入れる
        document.getElementById('startScanBtn').click(); 
    }

    function clearInput() {
        document.getElementById('scanResult').style.display = "none";
        document.getElementById('inputQty').value = "";
    }

    function updateTable() {
        const tbody = document.querySelector('#listTable tbody');
        tbody.innerHTML = "";
        scannedList.forEach(item => {
            const row = `<tr><td>${item.code}</td><td>${item.name}</td><td>${item.qty}</td></tr>`;
            tbody.innerHTML += row;
        });
        document.getElementById('count').innerText = scannedList.length;
    }

    // --- 4. CSV出力処理 ---
    function downloadCSV() {
        if(scannedList.length === 0) { alert("データがありません"); return; }
        
        let csvContent = "コード,薬品名,数量\n";
        scannedList.forEach(item => {
            csvContent += `${item.code},${item.name},${item.qty}\n`;
        });

        // BOMを付加してExcelでの文字化け防止
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: "text/csv" });
        const url = window.URL.createObjectURL(blob);
        
        const a = document.createElement("a");
        a.href = url;
        a.download = `棚卸結果_${new Date().toLocaleTimeString().replace(/:/g,'-')}.csv`;
        a.click();
    }
</script>

</body>

</html>
